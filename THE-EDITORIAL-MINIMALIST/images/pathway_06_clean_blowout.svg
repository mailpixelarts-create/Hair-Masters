      <stop offset="100%" stop-color="#B8B8B8"/>
    </linearGradient>
    <linearGradient id="hair6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B5B4B"/>
      <stop offset="50%" stop-color="#7A6A5A"/>
      <stop offset="100%" stop-color="#5A4A3A"/>
