  <path d="M780 500 Q750 700 760 900" fill="url(#hair6)" opacity="0.8"/>
  <path d="M1220 500 Q1250 700 1240 900" fill="url(#hair6)" opacity="0.8"/>
  <!-- Soft bends at ends -->
  <path d="M760 900 Q740 950 755 1000" fill="none" stroke="#7A6A5A" stroke-width="8" stroke-linecap="round"/>
  <path d="M1240 900 Q1260 950 1245 1000" fill="none" stroke="#7A6A5A" stroke-width="8" stroke-linecap="round"/>
  <!-- Highlights -->
  <ellipse cx="960" cy="480" rx="60" ry="40" fill="white" opacity="0.08"/>
  <ellipse cx="1040" cy="520" rx="45" ry="30" fill="white" opacity="0.06"/>
