<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3200 1800" width="3200" height="1800">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8D0C8"/>
      <stop offset="100%" stop-color="#C8C0B8"/>
    </linearGradient>
  </defs>
  <!-- Stone surface -->
  <rect width="3200" height="1800" fill="url(#stone)"/>
  <!-- Subtle stone texture lines -->
  <line x1="0" y1="600" x2="3200" y2="600" stroke="#C0B8B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="1200" x2="3200" y2="1200" stroke="#C0B8B0" stroke-width="0.5" opacity="0.2"/>
  <!-- Comb -->
  <line x1="1200" y1="900" x2="2000" y2="900" stroke="#2A2A2A" stroke-width="8" stroke-linecap="round"/>
  <!-- Comb teeth -->
  <g stroke="#2A2A2A" stroke-width="3">
    <line x1="1250" y1="895" x2="1250" y2="850"/>
    <line x1="1300" y1="895" x2="1300" y2="850"/>
    <line x1="1350" y1="895" x2="1350" y2="850"/>
    <line x1="1400" y1="895" x2="1400" y2="850"/>
    <line x1="1450" y1="895" x2="1450" y2="850"/>
    <line x1="1500" y1="895" x2="1500" y2="850"/>
    <line x1="1550" y1="895" x2="1550" y2="850"/>
    <line x1="1600" y1="895" x2="1600" y2="850"/>
    <line x1="1650" y1="895" x2="1650" y2="850"/>
    <line x1="1700" y1="895" x2="1700" y2="850"/>
    <line x1="1750" y1="895" x2="1750" y2="850"/>
  </g>
  <!-- Light catch on comb teeth -->
  <g stroke="white" stroke-width="1" opacity="0.3">
    <line x1="1250" y1="893" x2="1250" y2="855"/>
    <line x1="1300" y1="893" x2="1300" y2="855"/>
    <line x1="1350" y1="893" x2="1350" y2="855"/>
    <line x1="1400" y1="893" x2="1400" y2="855"/>
  </g>
  <!-- Hand mirror -->
  <ellipse cx="1100" cy="1000" rx="80" ry="110" fill="#C8C0B8" opacity="0.7"/>
  <ellipse cx="1100" cy="1000" rx="75" ry="105" fill="#D8D0C8" opacity="0.5"/>
  <rect x="1094" y="1110" width="12" height="30" rx="2" fill="#8B7355"/>
  <!-- Reflection in mirror -->
  <rect x="1050" y="920" width="100" height="80" fill="#C0B8B0" opacity="0.3"/>
  <!-- Light on surface -->
  <ellipse cx="1600" cy="800" rx="400" ry="200" fill="white" opacity="0.04"/>
  <!-- Text -->
  <text x="1600" y="1700" font-family="Georgia, serif" font-size="28" fill="#8A7A6A" text-anchor="middle" letter-spacing="6">CONTACT A — THE END MARK</text>
</svg>