  </defs>
  <rect width="2000" height="2000" fill="url(#bg6)"/>
  <!-- Neck -->
  <rect x="850" y="1000" width="300" height="500" rx="80" fill="#E8D5C0"/>
  <!-- Shoulders -->
  <path d="M500 1500 Q750 1300 1000 1300 Q1250 1300 1500 1500 L1500 2000 L500 2000 Z" fill="#1A1A1A" opacity="0.9"/>
  <!-- Face -->
  <ellipse cx="1000" cy="750" rx="180" ry="240" fill="#EDDCC8"/>
  <!-- Hair volume - blowout crown -->
  <ellipse cx="1000" cy="500" rx="220" ry="180" fill="url(#hair6)"/>
  <path d="M780 500 Q850 350 1000 330 Q1150 350 1220 500" fill="url(#hair6)"/>
