<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1600" width="2400" height="1600">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8C0B8"/>
      <stop offset="100%" stop-color="#B0A8A0"/>
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8A8280" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#B0A8A0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Concrete wall -->
  <rect width="2400" height="1200" fill="url(#bgC)"/>
  <!-- Concrete floor -->
  <rect x="0" y="1200" width="2400" height="400" fill="#A09890"/>
  <!-- Window casting geometric shadows -->
  <rect x="0" y="200" width="400" height="800" fill="#FFF8E8" opacity="0.4"/>
  <!-- Geometric shadow lines on floor -->
  <polygon points="400,1200 800,1200 1100,1600 300,1600" fill="#8A8280" opacity="0.3"/>
  <polygon points="800,1200 1000,1200 1300,1600 600,1600" fill="#8A8280" opacity="0.15"/>
  <!-- Single pendant light -->
  <line x1="1800" y1="0" x2="1800" y2="200" stroke="#6A6A6A" stroke-width="2"/>
  <circle cx="1800" cy="200" r="15" fill="#4A4A4A"/>
  <circle cx="1800" cy="200" r="8" fill="#FFF8E8" opacity="0.6"/>
  <!-- Subject - walking away, head turned -->
  <ellipse cx="1600" cy="900" rx="50" ry="120" fill="#4A4A4A"/>
  <!-- Head turned 15° showing profile -->
  <ellipse cx="1600" cy="750" rx="45" ry="60" fill="#EDDCC8"/>
  <!-- Hair -->
  <path d="M1560 690 Q1600 670 1640 690 Q1650 750 1640 810" fill="#2A1A0A"/>
  <!-- Structured coat -->
  <path d="M1550 810 Q1550 1000 1500 1200 L1700 1200 Q1650 1000 1650 810 Z" fill="#3A3A3A"/>
  <!-- Text -->
  <text x="1200" y="1520" font-family="Georgia, serif" font-size="28" fill="#7A7A7A" text-anchor="middle" letter-spacing="6">EXPERIENCE C — THE CAMPAIGN</text>
</svg>