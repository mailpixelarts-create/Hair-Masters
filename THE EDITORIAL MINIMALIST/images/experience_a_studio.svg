<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1600" width="2400" height="1600">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8D8D0"/>
      <stop offset="100%" stop-color="#C0C0B8"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0B0A8"/>
      <stop offset="100%" stop-color="#909088"/>
    </linearGradient>
    <linearGradient id="windowLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="70%" stop-color="#FFF8E8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D8D8D0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Floor -->
  <rect x="0" y="1000" width="2400" height="600" fill="url(#floor)"/>
  <!-- Wall -->
  <rect x="0" y="0" width="2400" height="1000" fill="url(#wall)"/>
  <!-- Large window -->
  <rect x="100" y="100" width="600" height="800" fill="#FFF8E8" opacity="0.6"/>
  <rect x="100" y="100" width="600" height="800" fill="none" stroke="#A0A098" stroke-width="8"/>
  <line x1="400" y1="100" x2="400" y2="900" stroke="#A0A098" stroke-width="4"/>
  <line x1="100" y1="500" x2="700" y2="500" stroke="#A0A098" stroke-width="4"/>
  <!-- Window light on floor -->
  <polygon points="100,1000 700,1000 900,1600 -100,1600" fill="url(#windowLight)" opacity="0.4"/>
  <!-- Salon chair -->
  <ellipse cx="1200" cy="1050" rx="120" ry="30" fill="#1A1A1A"/>
  <rect x="1100" y="750" width="200" height="300" rx="30" fill="#1A1A1A"/>
  <ellipse cx="1200" cy="750" rx="100" ry="30" fill="#1A1A1A"/>
  <!-- Wooden console -->
  <rect x="1700" y="850" width="300" height="150" rx="5" fill="#8B7355"/>
  <rect x="1700" y="850" width="300" height="8" fill="#9B8365"/>
  <!-- Comb on console -->
  <line x1="1750" y1="830" x2="1850" y2="830" stroke="#2A2A2A" stroke-width="6" stroke-linecap="round"/>
  <!-- Scissors -->
  <circle cx="1900" cy="840" r="15" fill="#4A4A4A"/>
  <line x1="1900" y1="840" x2="1870" y2="830" stroke="#4A4A4A" stroke-width="3"/>
  <line x1="1900" y1="840" x2="1870" y2="850" stroke="#4A4A4A" stroke-width="3"/>
  <!-- Hand mirror -->
  <ellipse cx="1960" cy="850" rx="25" ry="35" fill="#C0C0B8" opacity="0.6"/>
  <rect x="1955" y="885" width="10" height="20" fill="#8B7355"/>
  <!-- Frameless mirror leaning -->
  <rect x="1400" y="200" width="300" height="600" rx="5" fill="#D0C8B8" opacity="0.4"/>
  <rect x="1400" y="200" width="300" height="600" rx="5" fill="none" stroke="#A0A098" stroke-width="3"/>
  <!-- Text -->
  <text x="1200" y="1500" font-family="Georgia, serif" font-size="28" fill="#7A7A7A" text-anchor="middle" letter-spacing="6">EXPERIENCE A — THE STUDIO</text>
</svg>