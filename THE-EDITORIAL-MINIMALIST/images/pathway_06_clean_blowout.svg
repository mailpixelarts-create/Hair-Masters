  <ellipse cx="1000" cy="780" rx="12" ry="5" fill="#C8A888" opacity="0.3"/>
  <!-- Text -->
  <text x="1000" y="1850" font-family="Georgia, serif" font-size="28" fill="#7A7A7A" text-anchor="middle" letter-spacing="6">PATHWAY 06 — THE CLEAN BLOWOUT</text>
